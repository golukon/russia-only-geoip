name: Build geoip files
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - main
    paths-ignore:
      - ".gitignore"
      - "LICENSE*"
      - "*.md"
permissions:
  contents: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Russian IP ranges
        run: |
          curl -fsSL -o ./ip-russia.txt "https://iwik.org/ipcountry/RU.cidr"

      - name: Commit updated IP ranges list to "ip-russia" branch
        env:
          REMOTE: "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
        run: |
          set -e
          rm -rf ip-russia-branch
          if git clone --branch ip-russia --single-branch "$REMOTE" ip-russia-branch 2>/dev/null; then
            cd ip-russia-branch
          else
            mkdir ip-russia-branch
            cd ip-russia-branch
            git init -b ip-russia
            git remote add origin "$REMOTE"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp ../ip-russia.txt ./ip-russia.txt
          git add ip-russia.txt
          if ! git diff --staged --quiet; then
            git commit -m "Update ip-russia.txt"
            git push origin ip-russia
          fi
          cd ..

      - name: Checkout golukon/geoip
        uses: actions/checkout@v4
        with:
          repository: golukon/geoip
          path: geoip

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ./geoip/go.mod

      - name: Set variables
        run: |
          echo "TAG_NAME=$(date +%d-%m-%Y)" >> $GITHUB_ENV
          echo "RELEASE_NAME=$(date +%d-%m-%Y)" >> $GITHUB_ENV
        shell: bash

      - name: Build geoip.dat
        run: |
          go build -C geoip ./
          ./geoip/geoip convert -c ./config.json

      - name: Generate sha256 checksum for geoip.dat
        run: |
          cd ./output || exit 1
          sha256sum geoip.dat > ./geoip.dat.sha256sum

      - name: Git push assets to "release" branch
        run: |
          cd output || exit 1
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b release
          git add -A
          git commit -m "${{ env.RELEASE_NAME }}"
          git remote add geoip "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f -u geoip release

      - name: Purge jsdelivr CDN
        run: |
          cd output || exit 1
          for file in $(ls); do
            curl -i "https://purge.jsdelivr.net/gh/${{ github.repository }}@release/${file}"
          done

      - name: Upload files to GitHub release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file_glob: true
          file: ./output/*
          release_name: ${{ env.RELEASE_NAME }}
          tag: ${{ env.TAG_NAME }}
          overwrite: true
